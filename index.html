<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Painel - Frota (GViz)</title>

<style>
:root{
  --bg:#071029;
  --card:#0b1a3a;
  --table:#0e224d;
  --table-alt:#0c1d40;
  --header:#2c4078;
  --border:#1e2f5c;
  --text:#f7f9fa;
  --muted:#9fb3ff;
}

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:Inter,Arial;
}

/* HEADER */
header{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  padding:12px 34px;
  background:#020617;
  border-radius:10px;
  border:1px solid #fff;
}
header > div{ text-align:center; }

.title{ font-size:30px; font-weight:700; }

#status-empregados span{
  display:inline-block;
  margin:0 12px;
  padding:4px 10px;
  border-radius:6px;
}

.ocupado{ background:rgba(255,77,77,.15); color:#ff4d4d; }
.livre{ background:rgba(0,255,156,.15); color:#00ff9c; }

/* CARDS */
main{
  padding:12px;
  display:grid;
  grid-template-rows:1fr 1fr 1fr;
  gap:10px;
}

.card{ background:var(--card); }

.card h2{
  text-align:center;
}

/* FILTRO */
#filtros-status{
  text-align:center;
  margin-bottom:10px;
}

#filtros-status button{
  margin:0 5px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#1e2f5c;
  color:#fff;
  cursor:pointer;
}

#filtros-status button.ativo{
  background:#00eaff;
  color:#000;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  text-align:center;
  border:1px solid var(--border);
}

thead th{
  background:var(--header);
}

tbody td{ background:var(--table); }

tbody tr:nth-child(even) td{
  background:var(--table-alt);
}

/* STATUS */
tr.status-atendido td{ background:rgba(0,255,156,.12); }
tr.status-andamento td{ background:rgba(255,204,0,.12); }
tr.status-concluido td{ background:rgba(124,252,0,.10); }
tr.status-cancelado td{ background:rgba(255,77,77,.15); }

</style>
</head>

<body>

<header>
  <div></div>
  <div>
    <div class="title">MOVIMENTAÇÃO DIÁRIA</div>
    <div id="status-empregados"></div>
  </div>
  <div id="clock"></div>
</header>

<main>
  <section class="card">
    <h2>PAINEL</h2>

    <!-- FILTROS -->
    <div id="filtros-status">
      <button onclick="setFiltro('todos', this)" class="ativo">TODOS</button>
      <button onclick="setFiltro('andamento', this)">ANDAMENTO</button>
      <button onclick="setFiltro('atendido', this)">ATENDIDO</button>
      <button onclick="setFiltro('concluido', this)">CONCLUÍDO</button>
      <button onclick="setFiltro('cancelado', this)">CANCELADO</button>
    </div>

    <div id="painel">Carregando...</div>
  </section>

  <section class="card">
    <h2>AGENDA DO DIA</h2>
    <div id="agenda"></div>
  </section>

  <section class="card">
    <h2>AGENDA SERVIÇO SOCIAL</h2>
    <div id="social"></div>
  </section>
</main>

<script>
const SHEET_ID = "1Ch3AjQ0MDo4WuQWFDR3r8nZrHb4yQkSLOtT5_QgxT6E";

const TABS = [
  { id:"painel", name:"PAINEL" },
  { id:"agenda", name:"AGENDA DO DIA" },
  { id:"social", name:"AGENDA SERVIÇO SOCIAL" }
];

const TABLE_HEADERS = {
  painel:["Data","Hora","Veículo","Empregado","Motivo","Itinerário","Status"],
  agenda:["Data","Hora","Passageiro","Setor","Motivo","Itinerário","Status"],
  social:["Data","Período","Passageiro","Motivo","Itinerário","Status"]
};

let filtroAtual = "todos";

/* RELÓGIO */
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("pt-BR");
},1000);

/* FILTRO */
function setFiltro(f, el){
  filtroAtual = f;
  document.querySelectorAll("#filtros-status button")
    .forEach(b=>b.classList.remove("ativo"));
  el.classList.add("ativo");
  loadAll();
}

/* FETCH */
async function fetchSheet(tab){
  const r = await fetch(
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${tab}&tqx=out:json`
  );
  const t = await r.text();
  return JSON.parse(t.substring(t.indexOf("{"), t.lastIndexOf("}")+1));
}

/* RENDER */
function renderTable(id,g){
  const rows = g.table.rows;
  let html="<table><thead><tr>";

  TABLE_HEADERS[id].forEach(h=>html+=`<th>${h}</th>`);
  html+="</tr></thead><tbody>";

  rows.forEach(r=>{
    const cells=r.c||[];
    const status=String(cells.at(-1)?.v||"").toLowerCase();

    if(id==="painel" && filtroAtual!=="todos"){
      if(!status.includes(filtroAtual)) return;
    }

    html+=`<tr class="status-${status}">`;

    cells.forEach((c,i)=>{
      if(i===cells.length-1){
        let icon="⏳";
        if(status.includes("concluido")) icon="✔";
        if(status.includes("cancelado")) icon="✖";
        html+=`<td>${icon}</td>`;
      }else{
        html+=`<td>${c?.v||""}</td>`;
      }
    });

    html+="</tr>";
  });

  html+="</tbody></table>";
  document.getElementById(id).innerHTML=html;
}

/* EMPREGADOS */
function atualizarStatusEmpregados(g){
  const nomes=["CACIO","CELSO","NEI"];
  const usados={};

  nomes.forEach(n=>usados[n]=false);

  g.table.rows.forEach(r=>{
    r.c.forEach(c=>{
      const v=String(c?.v||"").toUpperCase();
      nomes.forEach(n=>{
        if(v.includes(n)) usados[n]=true;
      });
    });
  });

  document.getElementById("status-empregados").innerHTML =
    nomes.map(n=>`<span class="${usados[n]?'ocupado':'livre'}">
      ${n} (${usados[n]?'OCUPADO':'LIVRE'})
    </span>`).join("");
}

/* LOAD */
async function loadAll(){
  const results = await Promise.all(TABS.map(t=>fetchSheet(t.name)));

  renderTable("painel",results[0]);
  renderTable("agenda",results[1]);
  renderTable("social",results[2]);

  atualizarStatusEmpregados(results[0]);
}

loadAll();
setInterval(loadAll,10000);
</script>

</body>
</html>
